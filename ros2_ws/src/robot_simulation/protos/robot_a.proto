#VRML_SIM R2025a utf8
PROTO robot_a [
  field  SFVec3f     translation     0 0 0.056
  field  SFRotation  rotation        0 0 1 0
  field  SFString    name            "robot_a"
  field  SFString    controller      "<extern>"
  field  MFString    controllerArgs  []
  field  SFString    customData      ""
  field  SFBool      supervisor      FALSE
  field  SFBool      synchronization TRUE
  field  SFBool      selfCollision   FALSE
]
{
  Robot {
  translation IS translation
  rotation IS rotation
  children [
    GPS {
      name "gps"
    }
    InertialUnit {
      translation -0.08535 0 -0.04
      rotation 1 0 0 3.14159
      name "my_imu"
    }
    Gyro {
      translation -0.085 0 -0.04
      rotation 1 0 0 3.14159
      name "gyro"
      lookupTable [
        -1000 -1000 0.01
        1000 1000 0.01
      ]
    }
    Accelerometer {
      translation -0.085 0 -0.04
      rotation 1 0 0 3.14159
      name "accelerometer"
      lookupTable [
        -1000 -1000 0.01
        1000 1000 0.01
      ]
    }
    Shape {
      appearance DEF white PBRAppearance { roughness 1 metalness 0 }
      geometry Box { size 0.31 0.22 0.08 }
    }
    # --- RIGHT MOTOR ---
    HingeJoint {
      jointParameters HingeJointParameters {
        position 0
        axis 0 1 0
        anchor -0.08535 -0.125 -0.02105
      }
      device [
        RotationalMotor {
          name "joint_br"
          maxVelocity 17.29
          maxTorque 1.2
        }
        PositionSensor { 
          name "joint_br_sensor" 
          resolution 0.05236
          noise 0.02
        }
      ]
      endPoint Solid {
        translation -0.08535 -0.125 -0.02105
        children [
          Pose {
            rotation 1 0 0 1.5708
            children [
              Shape {
                appearance DEF blue PBRAppearance { baseColor 0 0 1 roughness 1 metalness 0 }
                geometry Cylinder { height 0.0255 radius 0.0347 }
              }
            ]
          }
        ]
        name "link_br"
        boundingObject Pose {
          rotation 1 0 0 1.5708
          children [ Sphere { radius 0.0347 } ]
        }
        physics Physics {
          density -1
          mass 0.2355
          centerOfMass [ 0 0 0 ]
          inertiaMatrix [ 8.354e-05 0.00014178 8.354e-05, 0 0 0 ]
        }
      }
    }
    # --- LEFT MOTOR ---
    HingeJoint {
      jointParameters HingeJointParameters {
        position 0
        axis 0 1 0
        anchor -0.08535 0.125 -0.02105
      }
      device [
        RotationalMotor {
          name "joint_bl"
          maxVelocity 17.29
          maxTorque 1.2
        }
        PositionSensor { 
          name "joint_bl_sensor" 
          resolution 0.05236
          noise 0.02
        }
      ]
      endPoint Solid {
        translation -0.08535 0.125 -0.02105
        children [
          Pose {
            rotation 1 0 0 1.5708
            children [
              Shape {
                appearance PBRAppearance { baseColor 0.5 0.5 0.5 roughness 1 metalness 0 }
                geometry Cylinder { height 0.0255 radius 0.0347 }
              }
            ]
          }
        ]
        name "link_bl"
        boundingObject Pose {
          rotation 1 0 0 1.5708
          children [ Sphere { radius 0.0347 } ]
        }
        physics Physics {
          density -1
          mass 0.2355
          centerOfMass [ 0 0 0 ]
          inertiaMatrix [ 8.354e-05 0.00014178 8.354e-05, 0 0 0 ]
        }
      }
    }
    # --- FRONT CASTER ---
    Solid {
      translation 0.0965 0 -0.048
      children [
        Solid {
          children [
            Shape {
              appearance DEF grey PBRAppearance { baseColor 0.5 0.5 0.5 roughness 1 metalness 0 }
              geometry Sphere { radius 0.007995 }
            }
          ]
          name "link_front"
          contactMaterial "frictionless_caster"
          boundingObject Sphere { radius 0.007995 }
          physics Physics {
            density -1
            mass 0.05
            centerOfMass [ 0 0 0 ]
            inertiaMatrix [ 1e-06 1e-06 1e-06, 0 0 0 ]
          }
        }
      ]
      name "caster_swivel"
      physics Physics {
        density -1
        mass 0.001
        centerOfMass [ 0 0 0 ]
        inertiaMatrix [ 1e-06 1e-06 1e-06, 0 0 0 ]
      }
    }
    # --- LIDAR ---
    Solid {
      translation 0 0 0.04
      children [
        Pose {
          translation 0 0 0.02425
          children [
            Shape {
              appearance DEF dark_grey PBRAppearance { baseColor 0.2 0.2 0.2 roughness 1 metalness 0 }
              geometry Cylinder { height 0.0485 radius 0.0125 }
            }
          ]
        }
        Lidar {
          name "webots_lidar"
          horizontalResolution 360
          fieldOfView 6.28318
          numberOfLayers 1
          minRange 0.12
          maxRange 3.5
          noise 0.03
          resolution 0.015
        }
      ]
      name "lidar_link"
      boundingObject Pose {
        translation 0 0 0.02425
        children [ Cylinder { height 0.0485 radius 0.0125 } ]
      }
      physics Physics {
        density -1
        mass 0.052
        centerOfMass [ 0 0 0 ]
        inertiaMatrix [ 4e-06 4e-06 4e-06, 0 0 0 ]
      }
    }
    # --- CAMERA ---
    Solid {
      translation 0.1595 0 0.00364
      rotation -0.58906 0.55318 -0.58906 2.02114
      children [
        Shape {
          appearance DEF red PBRAppearance { baseColor 1 0 0 roughness 1 metalness 0 }
          geometry Box { size 0.0045 0.025 0.023 }
        }
        Pose {
          rotation 0.57735 -0.57735 0.57735 2.09439
          children [
            Camera {
              name "my_webots_camera"
              fieldOfView 1.047
              width 640
              height 480
            }
          ]
        }
      ]
      name "camera_link"
      physics Physics {
        density -1
        mass 0.004
        centerOfMass [ 0 0 0 ]
        inertiaMatrix [ 3e-07 2e-07 2e-07, 0 0 0 ]
      }
    }
  ]
  name IS name
  boundingObject Box { size 0.31 0.22 0.08 }
  physics Physics {
    density -1
    mass 1.54074
    centerOfMass [ 0 0 0 ]
    inertiaMatrix [ 0.007512 0.014051 0.019808, 0 0 0 ]
  }
  controller IS controller
  controllerArgs IS controllerArgs
  customData IS customData
  supervisor IS supervisor
  synchronization IS synchronization
  selfCollision IS selfCollision
}
}
