controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    diffdrive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diffdrive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ['joint_bl']
    right_wheel_names: ['joint_br']
    wheel_separation: 0.25
    wheel_radius: 0.0347
    publish_rate: 30.0
    cmd_vel_timeout: 0.5
    use_stamped_vel: false

    # [CRITICAL FIX]: Gag the diff-drive TF broadcast so the EKF is the single source of truth
    enable_odom_tf: false

    # [CRITICAL FIX]: Inject base covariance so the EKF math does not implode with a 0.0 denominator
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    linear:
      x: 
        has_velocity_limits: true
        max_velocity: 0.4        
        has_acceleration_limits: true
        max_acceleration: 0.5    
        has_jerk_limits: false

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.5
        has_acceleration_limits: true
        max_acceleration: 1.5      
        has_jerk_limits: false